AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Medical PII De-identification API - AWS Lambda Deployment

Globals:
  Function:
    Timeout: 60
    MemorySize: 3008
    Environment:
      Variables:
        PRELOAD_MODEL: "false"
        PII_MODEL: "OpenMed/OpenMed-PII-SuperClinical-Small-44M-v1"
        TRANSFORMERS_CACHE: /var/task/hf_cache/hub
        HF_HOME: /var/task/hf_cache
        HF_HUB_OFFLINE: "1"
        TRANSFORMERS_OFFLINE: "1"

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod

Resources:
  # Lambda Function
  PIIDeidentificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub medical-pii-removal-${Stage}
      PackageType: Image
      ImageUri: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/medical-pii-removal:latest
      Description: HIPAA-compliant PII detection and de-identification API
      AutoPublishAlias: live
      ProvisionedConcurrencyConfig:
        ProvisionedConcurrentExecutions: 1
      Architectures:
        - x86_64
      EphemeralStorage:
        Size: 2048
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
            RestApiId: !Ref PIIApi
            Auth:
              ApiKeyRequired: true
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: '*'

  # API Gateway
  PIIApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub medical-pii-removal-api-${Stage}
      StageName: !Ref Stage
      Description: Medical PII De-identification REST API
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        AllowOrigin: "'*'"

  # API Key
  PIIApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: PIIApiStage
    Properties:
      Name: !Sub medical-pii-api-key-${Stage}
      Description: !Sub API Key for Medical PII De-identification - ${Stage}
      Enabled: true

  # Usage Plan
  PIIUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: PIIApiStage
    Properties:
      UsagePlanName: !Sub medical-pii-usage-plan-${Stage}
      Description: !Sub Usage plan for Medical PII De-identification API - ${Stage}
      ApiStages:
        - ApiId: !Ref PIIApi
          Stage: !Ref Stage
      Throttle:
        RateLimit: 10
        BurstLimit: 20
      Quota:
        Limit: 1000
        Period: MONTH

  # Link API Key to Usage Plan
  PIIUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref PIIApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref PIIUsagePlan

  # CloudWatch Log Group (with retention)
  PIIFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/medical-pii-removal-${Stage}
      RetentionInDays: 7

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${PIIApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}

  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt PIIDeidentificationFunction.Arn

  FunctionName:
    Description: Lambda Function Name
    Value: !Ref PIIDeidentificationFunction

  ApiKeyId:
    Description: API Key ID
    Value: !Ref PIIApiKey

  UsagePlanId:
    Description: Usage Plan ID
    Value: !Ref PIIUsagePlan
